@if (isAuthorized()) {
  <div class="toolbar-container">
    <mat-toolbar>
      <button mat-icon-button (click)="sidenav.toggle()" aria-label="Toggle sidenav">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="header-text">OrderManagement</span>
      <span class="spacer"></span>
      <span class="header-text--small">{{ currentUser()?.email }}</span>
      <button mat-button (click)="onLogout()">Выйти</button>
    </mat-toolbar>
  </div>
  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav
      #sidenav
      [mode]="(isHandset$ | async) ? 'over' : 'side'"
      [opened]="!(isHandset$ | async)"
      class="sidenav"
    >
      <mat-nav-list>
        <a mat-list-item routerLink="/products" routerLinkActive="active">
          <span matListItemTitle>Каталог</span>
        </a>
        <a mat-list-item routerLink="/orders" routerLinkActive="active">
          <span matListItemTitle>Заказы</span>
        </a>
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content> <router-outlet /></mat-sidenav-content>
  </mat-sidenav-container>
} @else {
  <router-outlet />
}
